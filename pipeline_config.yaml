# pipeline_config.yaml — De-hardcoded configuration for design_agent_pipeline.py
# Each value is annotated with its rationale: textbook reference, oncology heuristic, or practical convention.

# ==============================================================================
# STATISTICAL PARAMETERS
# ==============================================================================
# Textbook Ch 8 line 6360-6367: "While the chosen level of α is somewhat arbitrary,
# the ones used and accepted traditionally are 0.01, 0.025, or 0.05"
alpha: 0.05

# Textbook Ch 8 line 6395: "Typically, investigators like to have a power (1−β)
# of at least 0.80"; line 14664: "should be designed with a power of 0.80–0.90"
power_target: 0.80

# ==============================================================================
# POWER ASSESSMENT THRESHOLDS
# These are ONCOLOGY-SPECIFIC HEURISTICS, NOT textbook-standard values.
# No textbook chapter defines these cutoffs; they represent field convention
# for interpreting detectable effect sizes in oncology trials.
# ==============================================================================
dichotomous_power_assessment:
  # For detectable absolute difference (Δ) in proportion-based endpoints
  adequately_powered: 0.10   # Δ ≤ 0.10 → Adequately Powered
  borderline: 0.15           # Δ ≤ 0.15 → Borderline
  underpowered: 0.25         # Δ ≤ 0.25 → Underpowered
  # Δ > 0.25 → Severely Underpowered (implicit)

survival_power_assessment:
  # For detectable hazard ratio (HR) in time-to-event endpoints
  # In oncology, HR of 0.65-0.80 is typical for Phase 3 trials
  adequately_powered: 0.65   # HR ≤ 0.65 → Adequately Powered
  borderline: 0.75           # HR ≤ 0.75 → Borderline
  underpowered: 0.85         # HR ≤ 0.85 → Underpowered
  # HR > 0.85 → Severely Underpowered (implicit)

# ==============================================================================
# SURVIVAL POWER DEFAULTS
# Fallback values when indication_params doesn't supply them.
# ==============================================================================
# Textbook Ch 8 line 7197-7216: exponential model S(t)=exp(−λt)
# These medians correspond to λ derived from typical oncology control arms.
survival_defaults:
  control_median_os_months: 6.0   # Fallback for OS when indication unknown
  control_median_pfs_months: 3.5  # Fallback for PFS when indication unknown
  event_rate: 0.85                 # Proportion of enrolled patients expected to have an event

# Default control rate for dichotomous endpoints when indication_params doesn't specify one.
# Matches default_indication_params.control_rate_dichotomous.
# Oncology heuristic: 10% response rate is a common floor for placebo/sham arms.
default_control_rate_dichotomous: 0.10

# Absolute improvement to estimate "realistic" power (e.g., "Power@20% improvement").
# This is a reporting convention, not a textbook value.
realistic_improvement_absolute: 0.20

# ==============================================================================
# INDICATION-SPECIFIC PARAMETERS
# Each entry maps to an indication key used by infer_indication().
# Textbook basis: power calculations require indication-specific control event
# rates, median survival times, and event rates (Ch 8 line 6323-6326).
# ==============================================================================
indication_params:
  psoriasis:
    control_rate_dichotomous: 0.10
    median_os_months: null      # Psoriasis rarely uses OS endpoint
    median_pfs_months: null
    event_rate: null
  nsclc:
    control_rate_dichotomous: 0.30
    median_os_months: 12.0
    median_pfs_months: 4.5
    event_rate: 0.80
  pdac:
    control_rate_dichotomous: 0.05
    median_os_months: 6.0
    median_pfs_months: 3.5
    event_rate: 0.85
  msi_h_tumor:
    control_rate_dichotomous: 0.15
    median_os_months: 18.0
    median_pfs_months: 5.0
    event_rate: 0.75
  solid_tumor:
    control_rate_dichotomous: 0.15
    median_os_months: 10.0
    median_pfs_months: 4.0
    event_rate: 0.80

default_indication_params:
  control_rate_dichotomous: 0.10
  median_os_months: 6.0
  median_pfs_months: 3.5
  event_rate: 0.85

# ==============================================================================
# INDICATION KEYWORD DETECTION
# Maps indication keys to keywords found in condition/title text.
# ==============================================================================
indication_keywords:
  psoriasis: [psoriasis, plaque psoriasis, pso, pasi, spga]
  nsclc: [non-small cell lung, nsclc, lung cancer, kras g12c, egfr, alk]
  pdac: [pancreatic, pdac, pancreas, pancreatic ductal]
  msi_h_tumor: [msi-h, microsatellite instability, msi high, mismatch repair deficient, dmmr]
  solid_tumor: [solid tumor, advanced solid, metastatic solid, refractory solid]

# ==============================================================================
# MASKING NORMALIZATION
# Textbook Ch 7 line 5648-5672: textbook covers unblinded, single-blind, double-blind,
# triple-blind. Triple-blind is double-blind + blinded monitoring committee (line 5837-5839).
# Textbook doesn't define "quadruple-blind" — normalization to Double-blind is practical convention.
# ==============================================================================
masking_map:
  NONE: Open-label
  SINGLE: Single-blind
  DOUBLE: Double-blind
  TRIPLE: Double-blind    # Triple-blind = double-blind + blinded DSMB (textbook Ch 7)
  QUADRUPLE: Double-blind # No textbook basis; "quadruple-blind" is nonstandard terminology

# ==============================================================================
# RECRUITMENT YIELD ESTIMATION
# Textbook Ch 10 line 2870-2875, 3253-3282: restrictive criteria impact recruitment.
# Thresholds below are practical heuristics, not textbook-defined values.
# ==============================================================================
recruitment_yield:
  restrictive_count_thresholds:
    low: 2          # ≥2 restrictive factors → Low yield (<5% screen-to-enroll)
    moderate: 1     # ≥1 restrictive factors → Moderate yield (5-20%)
    # 0 restrictive factors → High yield (>20%)

